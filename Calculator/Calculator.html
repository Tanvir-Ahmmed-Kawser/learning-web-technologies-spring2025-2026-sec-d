<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Calculator.css">
</head>
<body>
    <table border="1" id="table">
        <tr>
            <td colspan="4" width="auto" height="30px">
                <label for="Display" name="Display" id="Display"></label>
            </td>
        </tr>
        <tr>
            <td>
                <input type="button" value="1" id="btn1" name="btn1" class="btn">
            </td>
            <td>
                <input type="button" value="2" id="btn2" name="btn2" class="btn">
            </td>
            <td>
                <input type="button" value="3" id="btn3" name="btn3" class="btn">
            </td>
            <td>
                <input type="button" value="/" id="opDiv" name="opDiv" class="btn">
            </td>
        </tr>
        <tr>
            <td>
                <input type="button" value="4" id="btn4" name="btn4" class="btn">
            </td>
            <td>
                <input type="button" value="5" id="btn5" name="btn5" class="btn">
            </td>
            <td>
                <input type="button" value="6" id="btn6" name="btn6" class="btn">
            </td>
            <td>
                <input type="button" value="*" id="opMul" name="opMul" class="btn">
            </td>
        </tr>
        <tr>
            <td>
                <input type="button" value="7" id="btn7" name="btn7" class="btn">
            </td>
            <td>
                <input type="button" value="8" id="btn8" name="btn8" class="btn">
            </td>
            <td>
                <input type="button" value="9" id="btn9" name="btn9" class="btn">
            </td>
            <td>
                <input type="button" value="-" id="opSub" name="opSub" class="btn">
            </td>
        </tr>
        <tr>
            <td>
                <input type="button" value="Clear" id="Clear" name="Clear" class="btn">
            </td>
            <td>
                <input type="button" value="0" id="btn0" name="btn0" class="btn">
            </td>
            <td>
                <input type="button" value="=" id="equal" name="equal" class="btn">
            </td>
            <td>
                <input type="button" value="+" id="opSub" name="opSub" class="btn">
            </td>
        </tr>
    </table>

    <script src="Calculator.js"></script>
</body>
</html>
